<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام كوديفاي | مولد مفاتيح التفعيل</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #02040a;
      --card-bg: #0b0f19;
      --border-color: #1e293b;
      --teal-accent: #2dd4bf;
      --teal-glow: rgba(45, 212, 191, 0.15);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Cairo', 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6, var(--teal-accent));
      border-radius: 0 0 10px 10px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-container {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 2px solid var(--teal-accent);
      box-shadow: 0 0 15px var(--teal-glow);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px auto;
      overflow: hidden;
      padding: 6px;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 24px;
      display: flex;
      flex-col: column;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background-color: #02040a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 14px;
      color: var(--text-main);
      font-family: 'Outfit', monospace;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--teal-accent);
      box-shadow: 0 0 10px var(--teal-glow);
    }

    button {
      width: 100%;
      background: linear-gradient(90deg, #1d4ed8, #2dd4bf);
      border: 1px solid rgba(45, 212, 191, 0.2);
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(45, 212, 191, 0.15);
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(45, 212, 191, 0.25);
    }

    button:active {
      transform: translateY(0);
    }

    .result-box {
      margin-top: 25px;
      background-color: #02040a;
      border: 1px dashed var(--border-color);
      border-radius: 14px;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--teal-accent);
    }

    .result-key {
      font-family: 'Outfit', monospace;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      color: #fff;
      letter-spacing: 2px;
      background: rgba(255,255,255,0.02);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      user-select: all;
    }

    .copy-btn {
      background: #0b0f19;
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 700;
      width: auto;
      margin-top: 0;
      color: var(--text-muted);
      border-radius: 8px;
    }

    .copy-btn:hover {
      color: var(--teal-accent);
      border-color: var(--teal-accent);
    }

    .instruction {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 15px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo-container">
        <img src="public/5.png" class="logo-img" alt="Logo" />
      </div>
      <h1>مولد مفاتيح تفعيل كوديفاي</h1>
      <div class="subtitle">KODIFY LICENSE KEY GENERATOR</div>
    </div>

    <div class="form-group">
      <label for="machineId">أدخل معرف الجهاز الخاص بالزبون (Machine ID)</label>
      <input type="text" id="machineId" placeholder="KDFY-XXXX-XXXX-XXXX" autocomplete="off" />
    </div>

    <button onclick="generateKey()">توليد مفتاح التفعيل</button>

    <div class="result-box" id="resultBox">
      <div class="result-header">
        <span class="result-title">مفتاح التفعيل الخاص بالجهاز (Activation Key)</span>
        <button class="copy-btn" id="copyBtn" onclick="copyResult()">نسخ الرمز</button>
      </div>
      <div class="result-key" id="resultKey">ACT-XXXX-XXXX-XXXX</div>
    </div>

    <div class="instruction">
      * هذا المفتاح يتم توليده بناءً على المكونات الصلبة لحاسوب العميل ولن يشتغل على أي جهاز آخر.
    </div>
  </div>

  <script>
    const LICENSE_SALT = 'KodifySecure2026!@#';

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await window.crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex.toUpperCase();
    }

    async function generateKey() {
      const inputEl = document.getElementById('machineId');
      const resultBox = document.getElementById('resultBox');
      const resultKey = document.getElementById('resultKey');
      const copyBtn = document.getElementById('copyBtn');

      const rawMachineId = inputEl.value.trim().toUpperCase();

      if (!rawMachineId) {
        alert('يرجى إدخال معرف الجهاز أولاً!');
        return;
      }

      // Check format briefly
      if (!rawMachineId.startsWith('KDFY-')) {
        alert('معرف الجهاز غير صالح، يجب أن يبدأ بـ KDFY-');
        return;
      }

      try {
        const expectedHash = await sha256(rawMachineId + LICENSE_SALT);
        const activationKey = `ACT-${expectedHash.substring(0, 4)}-${expectedHash.substring(4, 8)}-${expectedHash.substring(8, 12)}-${expectedHash.substring(12, 16)}`;

        resultKey.innerText = activationKey;
        resultBox.style.display = 'flex';
        copyBtn.innerText = 'نسخ الرمز';
        copyBtn.style.color = '';
        copyBtn.style.borderColor = '';
      } catch (err) {
        alert('حدث خطأ أثناء تشفير المفتاح.');
        console.error(err);
      }
    }

    function copyResult() {
      const keyText = document.getElementById('resultKey').innerText;
      const copyBtn = document.getElementById('copyBtn');

      navigator.clipboard.writeText(keyText).then(() => {
        copyBtn.innerText = 'تم النسخ!';
        copyBtn.style.color = '#2dd4bf';
        copyBtn.style.borderColor = '#2dd4bf';
      }).catch(err => {
        console.error('Failed to copy key: ', err);
      });
    }
  </script>
</body>
</html>
